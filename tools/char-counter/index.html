<div class="wrap">
  <div class="grid">
    <!-- 左：入力 -->
    <div class="card">
      <label for="title">検索結果タイトル</label>
      <input id="title" type="text" placeholder="例）無料 文字数カウンター | tomy634.com"/>
      <div class="small" id="titleCount">0 文字</div>

      <label for="desc" style="margin-top:12px;display:block">検索結果の説明文</label>
      <input id="desc" type="text" placeholder="検索結果に表示される説明文をここに入力"/>
      <div class="small" id="descCount">0 文字</div>

      <label for="text" style="margin-top:12px;display:block">本文テキスト</label>
      <textarea id="text" rows="12" placeholder="ここにテキストを貼り付けてください"></textarea>

      <div class="controls">
        <label class="chk"><input type="checkbox" id="ignoreNewlines"> 改行を除外</label>
        <label class="chk"><input type="checkbox" id="trim"> 前後の空白を除去して計測</label>
      </div>

      <div class="controls">
        <button class="chk" id="copy" type="button">コピー</button>
        <button class="chk" id="clear" type="button">クリア</button>
        <button class="chk" id="sample" type="button">サンプルを入れる</button>
      </div>
    </div>

    <!-- 右：結果 -->
    <div class="card">
      <h2 style="margin:0 0 8px">計測結果</h2>
      <div class="kv">
        <div><b>文字数</b><div id="charsWith">0</div></div>
        <div><b>単語数（空白区切り）</b><div id="words">0</div></div>
        <div><b>行数</b><div id="lines">0</div></div>
        <div><b>UTF-8 バイト数</b><div id="bytes">0</div></div>
        <div><b>最長行の長さ</b><div id="maxline">0</div></div>
      </div>
    </div>
  </div>

  <div class="card" style="margin-top:12px">
    <h2 style="margin:0 0 8px">使い方</h2>
    <ul>
      <li>テキストを貼り付けるだけで、文字数・単語数・行数・バイト数などを自動で集計します。</li>
      <li>「改行を除外」「前後の空白を除去」のチェックで、カウント方針を調整できます。</li>
      <li>上部の入力欄で、検索結果に使うタイトル・説明文の文字数も確認できます。</li>
    </ul>
  </div>
</div>

<script>
(function(){
  'use strict';
  const el = id => document.getElementById(id);

  const title = el('title');
  const desc  = el('desc');
  const text  = el('text');

  const ignoreNewlines = el('ignoreNewlines');
  const trim = el('trim');

  const charsWith = el('charsWith');
  const words     = el('words');
  const lines     = el('lines');
  const bytes     = el('bytes');
  const maxline   = el('maxline');

  const titleCount = el('titleCount');
  const descCount  = el('descCount');

  function byteLengthUTF8(s){
    try { return new Blob([s]).size; } catch(e) {
      let len = 0;
      for (let i=0;i<s.length;i++){
        const code = s.charCodeAt(i);
        if (code < 0x80) len += 1;
        else if (code < 0x800) len += 2;
        else if (code >= 0xD800 && code <= 0xDBFF){ len += 4; i++; }
        else len += 3;
      }
      return len;
    }
  }

  function countWordsBySpace(s){
    const t = s.replace(/\s+/g,' ').trim();
    if(!t) return 0;
    return t.split(' ').length;
  }

  function update(){
    let t = text.value || '';
    if (trim.checked) t = t.trim();

    let base = t;
    if (ignoreNewlines.checked) base = base.replace(/\r?\n/g, '');

    const len = base.length;
    const wordCount = countWordsBySpace(base);

    const linesArr = (t === '' ? [] : t.split(/\r?\n/));
    const lineCount = linesArr.length;
    const maxLineLen = linesArr.reduce((m,l)=>Math.max(m,l.length),0);

    const blen = byteLengthUTF8(base);

    charsWith.textContent = len.toLocaleString('ja-JP');
    words.textContent     = wordCount.toLocaleString('ja-JP');
    lines.textContent     = lineCount.toLocaleString('ja-JP');
    bytes.textContent     = blen.toLocaleString('ja-JP');
    maxline.textContent   = maxLineLen.toLocaleString('ja-JP');

    const tl = (title.value||'').trim();
    const dl = (desc.value||'').trim();
    titleCount.textContent = tl.length + ' 文字';
    descCount.textContent  = dl.length + ' 文字';
  }

  function copyText(){
    const t = text.value || '';
    const fallback = ()=>{
      const ta = document.createElement('textarea');
      ta.value = t; ta.style.position='fixed'; ta.style.left='-9999px';
      document.body.appendChild(ta); ta.select();
      try{ document.execCommand('copy'); }catch(e){}
      document.body.removeChild(ta);
    };
    if (navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(t).catch(fallback);
    } else { fallback(); }
  }

  function clearText(){ text.value=''; update(); }

  function putSample(){
    text.value = 'これは文字数カウンターのサンプル文です。原稿や説明文の長さをざっくり確認したいときに使えます。URL（https://example.com/path?x=1）を含むテキストでもそのまま計測できます。';
    title.value = '無料 文字数カウンター | tomy634.com';
    desc.value  = '文字数・単語数・行数・UTF-8バイト数を計測するシンプルな文字数カウンターです。検索結果に使うタイトルや説明文の文字数チェックにも利用できます。';
    update();
  }

  ['input','change','keyup','paste'].forEach(ev=>{
    text.addEventListener(ev, update);
    title.addEventListener(ev, update);
    desc.addEventListener(ev, update);
    ignoreNewlines.addEventListener(ev, update);
    trim.addEventListener(ev, update);
  });

  el('copy').addEventListener('click', copyText);
  el('clear').addEventListener('click', clearText);
  el('sample').addEventListener('click', putSample);

  update();
})();
</script>
