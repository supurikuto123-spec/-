<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>demo@tomy634.com // MAIL LOG</title>
  <meta name="description" content="demo@tomy634.com に届いたメールの一覧表示デモ。" />
  <style>
    :root{
      --bg:#0a0f12; --text:#d7ffe8; --accent:#74ffcf; --muted:#89bfa6;
      --danger:#ff7189; --ok:#7dffb3; --warn:#ffd569;
    }
    *{box-sizing:border-box;}
    body{margin:0;font-family:ui-monospace,Consolas,monospace;background:var(--bg);color:var(--text);}
    header{display:flex;align-items:center;gap:12px;padding:20px;border-bottom:1px solid rgba(116,255,207,.2);}
    .logo{width:36px;height:36px;border:1px solid var(--accent);border-radius:8px;display:grid;place-items:center;box-shadow:0 0 12px rgba(116,255,207,.3);}
    .logo::after{content:"$";color:var(--accent);font-weight:700;}
    h1{font-size:20px;margin:0;color:var(--accent);}
    .sub{font-size:11px;color:var(--muted);margin-top:2px;}
    .wrap{padding:20px;max-width:900px;margin:auto;}
    .toolbar{display:flex;gap:10px;align-items:center;margin-bottom:12px;font-size:12px;color:var(--muted);flex-wrap:wrap;}
    .kbd{border:1px solid rgba(116,255,207,.35);border-radius:6px;padding:2px 6px;color:var(--accent);}
    button{background:rgba(14,30,32,.85);border:1px solid rgba(116,255,207,.35);color:var(--text);border-radius:8px;padding:4px 10px;font:inherit;cursor:pointer;}
    button:hover{box-shadow:0 0 0 1px rgba(116,255,207,.25) inset;}
    #mails{margin-top:8px;}
    .mail-item{border:1px solid rgba(116,255,207,.3);border-radius:10px;padding:12px 14px;margin-bottom:12px;background:rgba(12,24,28,.6);cursor:pointer;transition:all .2s;}
    .mail-item:hover{background:rgba(20,40,44,.8);}
    .subject{color:var(--accent);font-weight:bold;}
    .from{color:var(--ok);font-size:13px;margin-top:2px;}
    .date{color:var(--muted);font-size:11px;margin-top:2px;}
    .body{display:none;margin-top:10px;white-space:pre-wrap;border-top:1px dashed rgba(116,255,207,.3);padding-top:10px;font-size:13px;}
    .body a{color:#66aaff;text-decoration:underline;}
    .empty{margin-top:20px;padding:18px;border-radius:12px;border:1px dashed rgba(116,255,207,.25);text-align:center;color:var(--muted);font-size:13px;}
  </style>
</head>
<body>
  <header>
    <div class="logo"></div>
    <div>
      <h1>demo@tomy634.com // MAIL LOG</h1>
      <div class="sub">最新10件までの demo@ 宛メールを表示（実際に届いたメールをJSONから読み込みます）。</div>
    </div>
  </header>

  <div class="wrap">
    <div class="toolbar">
      <span class="kbd">endpoint</span> /api/demo-mails.json
      <span class="kbd">auto</span> <span id="autoSec">15</span>s
      <button id="btnReload">手動更新</button>
    </div>
    <div id="mails"></div>
    <div id="empty" class="empty" style="display:none;">
      まだ demo@tomy634.com 宛のメールはありません。
    </div>
  </div>

  <script>
    const API = '/api/demo-mails.json';
    const AUTO_SEC = 15;

    const jp = iso => {
      if (!iso) return '(日時不明)';
      const d = new Date(iso);
      if (Number.isNaN(d.getTime())) return iso;
      return d.toLocaleString('ja-JP', { timeZone: 'Asia/Tokyo', hour12: false });
    };

    function linkify(text) {
      const re = /(https?:\/\/[^\s<>"']+)/g;
      const frag = document.createDocumentFragment();
      let lastIndex = 0;
      let m;
      const pushText = s => frag.appendChild(document.createTextNode(s));
      while ((m = re.exec(text)) !== null) {
        pushText(text.slice(lastIndex, m.index));
        const a = document.createElement('a');
        a.href = m[1];
        a.target = '_blank';
        a.rel = 'noopener';
        a.textContent = m[1];
        frag.appendChild(a);
        lastIndex = m.index + m[0].length;
      }
      pushText(text.slice(lastIndex));
      return frag;
    }

    function render(items) {
      const list = document.getElementById('mails');
      const empty = document.getElementById('empty');
      list.innerHTML = '';

      if (!items || !items.length) {
        empty.style.display = 'block';
        return;
      }
      empty.style.display = 'none';

      items.slice(0, 10).forEach(m => {
        const div = document.createElement('div');
        div.className = 'mail-item';
        div.innerHTML = `
          <div class="subject"></div>
          <div class="from"></div>
          <div class="date"></div>
          <div class="body"></div>
        `;
        div.querySelector('.subject').textContent = m.subject || '(no subject)';
        div.querySelector('.from').textContent = 'From: ' + (m.from || '(unknown)');
        div.querySelector('.date').textContent = '日時: ' + jp(m.date || '');

        const bodyDiv = div.querySelector('.body');
        bodyDiv.appendChild(linkify(m.body || ''));

        div.addEventListener('click', () => {
          bodyDiv.style.display = bodyDiv.style.display === 'block' ? 'none' : 'block';
        });

        list.appendChild(div);
      });
    }

    async function load() {
      try {
        const res = await fetch(API, { cache: 'no-store' });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();
        data.sort((a, b) => (new Date(b.date) - new Date(a.date)));
        render(data);
      } catch (e) {
        console.error(e);
        render([]);
      }
    }

    document.getElementById('btnReload').addEventListener('click', load);
    document.getElementById('autoSec').textContent = AUTO_SEC;

    load();
    setInterval(load, AUTO_SEC * 1000);
  </script>
</body>
</html>
