<!DOCTYPE html>
<html lang="ja" data-theme="neon">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>更新状況 - Sutemeado</title>
  <meta name="description" content="Sutemeado一時メールサービスの更新履歴と変更ログです。">
  <meta name="theme-color" content="#0a0a0f">
  <link rel="icon" href="/favicon.ico?v=20260324c" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png?v=20260324c">
  <link rel="stylesheet" href="/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    .changelog-page {
      max-width: 800px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
      min-height: 100vh;
    }
    .changelog-header {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 2rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--border-color);
    }
    .changelog-back-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 1rem;
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      color: var(--text-primary);
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      text-decoration: none;
    }
    .changelog-back-btn:hover {
      background: var(--accent-primary);
      color: #000;
      border-color: var(--accent-primary);
    }
    .changelog-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text-primary);
      margin: 0;
    }
    .changelog-subtitle {
      color: var(--text-secondary);
      margin-bottom: 2rem;
    }
    .timeline {
      position: relative;
      padding-left: 2rem;
    }
    .timeline::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 2px;
      background: linear-gradient(to bottom, var(--accent-primary), var(--accent-secondary));
      border-radius: 1px;
    }
    .timeline-item {
      position: relative;
      margin-bottom: 2rem;
      padding-left: 1.5rem;
    }
    .timeline-item::before {
      content: '';
      position: absolute;
      left: -2rem;
      top: 0.25rem;
      width: 12px;
      height: 12px;
      background: var(--accent-primary);
      border-radius: 50%;
      border: 2px solid var(--bg-primary);
      box-shadow: 0 0 0 2px var(--accent-primary);
    }
    .timeline-date {
      font-size: 0.875rem;
      color: var(--accent-primary);
      font-weight: 600;
      margin-bottom: 0.5rem;
    }
    .timeline-version {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 0.75rem;
    }
    .timeline-badge {
      display: inline-flex;
      align-items: center;
      padding: 0.125rem 0.5rem;
      border-radius: 9999px;
      font-size: 0.625rem;
      font-weight: 700;
      text-transform: uppercase;
    }
    .timeline-badge.major {
      background: #00f5a0;
      color: #000;
    }
    .timeline-badge.minor {
      background: #00d4ff;
      color: #000;
    }
    .timeline-badge.patch {
      background: var(--text-muted);
      color: var(--bg-primary);
    }
    .timeline-content {
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      padding: 1.25rem;
    }
    .timeline-changes {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .timeline-change {
      display: flex;
      align-items: flex-start;
      gap: 0.75rem;
      padding: 0.5rem 0;
      border-bottom: 1px solid var(--border-color);
    }
    .timeline-change:last-child {
      border-bottom: none;
      padding-bottom: 0;
    }
    .timeline-change:first-child {
      padding-top: 0;
    }
    .change-type {
      display: inline-flex;
      align-items: center;
      padding: 0.125rem 0.5rem;
      border-radius: var(--radius-sm);
      font-size: 0.625rem;
      font-weight: 700;
      text-transform: uppercase;
      flex-shrink: 0;
    }
    .change-type.feat {
      background: #00f5a020;
      color: #00f5a0;
    }
    .change-type.fix {
      background: #ff475720;
      color: #ff4757;
    }
    .change-type.improve {
      background: #00d4ff20;
      color: #00d4ff;
    }
    .change-type.docs {
      background: #ffb80020;
      color: #ffb800;
    }
    .change-desc {
      color: var(--text-secondary);
      font-size: 0.875rem;
      line-height: 1.5;
    }
    .changelog-footer {
      margin-top: 3rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border-color);
      text-align: center;
      font-size: 0.875rem;
      color: var(--text-muted);
    }
    .changelog-empty {
      text-align: center;
      padding: 3rem 2rem;
      color: var(--text-muted);
    }
    .changelog-loading {
      text-align: center;
      padding: 3rem 2rem;
      color: var(--text-muted);
    }
    .changelog-loading .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--border-color);
      border-top-color: var(--accent-primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 1rem;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .changelog-error {
      text-align: center;
      padding: 2rem;
      color: #ff4757;
      background: #ff475710;
      border: 1px solid #ff475740;
      border-radius: var(--radius-lg);
    }
    .admin-link {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      margin-top: 1rem;
      padding: 0.5rem 1rem;
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 0.875rem;
      transition: all 0.2s ease;
    }
    .admin-link:hover {
      border-color: var(--accent-primary);
      color: var(--accent-primary);
    }
    @media (max-width: 640px) {
      .changelog-page {
        padding: 1rem;
      }
      .changelog-header {
        flex-wrap: wrap;
      }
      .changelog-title {
        font-size: 1.25rem;
        width: 100%;
        margin-top: 0.5rem;
      }
      .timeline {
        padding-left: 1.5rem;
      }
      .timeline-item {
        padding-left: 1rem;
      }
      .timeline-item::before {
        left: -1.5rem;
        width: 10px;
        height: 10px;
      }
    }
  </style>
</head>
<body>
  <div class="changelog-page">
    <header class="changelog-header">
      <a href="/" class="changelog-back-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="19" y1="12" x2="5" y2="12"/>
          <polyline points="12,19 5,12 12,5"/>
        </svg>
        戻る
      </a>
      <h1 class="changelog-title">更新状況</h1>
    </header>

    <p class="changelog-subtitle">Sutemeadoのバージョン履歴と変更ログです。</p>

    <div id="changelog-container">
      <div class="changelog-loading">
        <div class="spinner"></div>
        <p>読み込み中...</p>
      </div>
    </div>

    <div style="text-align: center;">
      <a href="/admin-cms.html" class="admin-link">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
          <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
        </svg>
        管理パネル
      </a>
    </div>

    <div class="changelog-footer">
      <p>&copy; 2026 Sutemeado - ステメアド</p>
    </div>
  </div>

  <script>
    // 日付フォーマット
    function formatDate(dateString) {
      const date = new Date(dateString);
      return date.toLocaleDateString('ja-JP', {
        year: 'numeric',
        month: 'long',
        day: 'numeric'
      });
    }

    // バッジラベル取得
    function getBadgeLabel(badge) {
      const labels = {
        major: 'MAJOR',
        minor: 'MINOR',
        patch: 'PATCH'
      };
      return labels[badge] || 'UPDATE';
    }

    // 変更タイプのラベル
    function getChangeTypeLabel(type) {
      const labels = {
        feat: 'FEAT',
        fix: 'FIX',
        improve: 'IMPROVE',
        docs: 'DOCS'
      };
      return labels[type] || 'UPDATE';
    }

    // 更新履歴読み込み
    async function loadChangelog() {
      const container = document.getElementById('changelog-container');
      
      try {
        const res = await fetch('/api/cms/changelog');
        const data = await res.json();
        
        if (!data.success || !data.items || data.items.length === 0) {
          container.innerHTML = `
            <div class="changelog-empty">
              <p>準備中</p>
            </div>
          `;
          return;
        }

        const html = data.items.map(item => {
          const changesHtml = item.changes.map(change => `
            <li class="timeline-change">
              <span class="change-type ${change.type}">${getChangeTypeLabel(change.type)}</span>
              <span class="change-desc">${escapeHtml(change.desc)}</span>
            </li>
          `).join('');

          return `
            <div class="timeline-item">
              <div class="timeline-date">${formatDate(item.date)}</div>
              <div class="timeline-version">
                ${escapeHtml(item.version)}
                <span class="timeline-badge ${item.badge}">${getBadgeLabel(item.badge)}</span>
              </div>
              <div class="timeline-content">
                <ul class="timeline-changes">
                  ${changesHtml}
                </ul>
              </div>
            </div>
          `;
        }).join('');

        container.innerHTML = `<div class="timeline">${html}</div>`;
      } catch (err) {
        container.innerHTML = `
          <div class="changelog-error">
            <p>更新履歴の読み込みに失敗しました</p>
            <p style="font-size:0.875rem;margin-top:0.5rem;">${err.message}</p>
          </div>
        `;
      }
    }

    // HTMLエスケープ
    function escapeHtml(text) {
      if (!text) return '';
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // 初期読み込み
    loadChangelog();
  </script>
</body>
</html>
