<!DOCTYPE html>
<html lang="ja" data-theme="neon">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>更新状況 - Sutemeado</title>
  <meta name="description" content="Sutemeado一時メールサービスの更新履歴と変更ログです。">
  <meta name="theme-color" content="#0a0a0f">
  <link rel="icon" href="/favicon.ico?v=20260324c" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png?v=20260324c">
  <link rel="stylesheet" href="/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    .changelog-page {
      max-width: 800px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
      min-height: 100vh;
    }
    .changelog-header {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 2rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--border-color);
    }
    .changelog-back-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 1rem;
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      color: var(--text-primary);
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      text-decoration: none;
    }
    .changelog-back-btn:hover {
      background: var(--accent-primary);
      color: #000;
      border-color: var(--accent-primary);
    }
    .changelog-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text-primary);
      margin: 0;
    }
    .changelog-subtitle {
      color: var(--text-secondary);
      margin-bottom: 2rem;
    }
    .timeline {
      position: relative;
      padding-left: 2rem;
    }
    .timeline::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 2px;
      background: linear-gradient(to bottom, var(--accent-primary), var(--accent-secondary));
      border-radius: 1px;
    }
    .timeline-item {
      position: relative;
      margin-bottom: 2rem;
      padding-left: 1.5rem;
    }
    .timeline-item::before {
      content: '';
      position: absolute;
      left: -2rem;
      top: 0.25rem;
      width: 12px;
      height: 12px;
      background: var(--accent-primary);
      border-radius: 50%;
      border: 2px solid var(--bg-primary);
      box-shadow: 0 0 0 2px var(--accent-primary);
    }
    .timeline-date {
      font-size: 0.875rem;
      color: var(--accent-primary);
      font-weight: 600;
      margin-bottom: 0.5rem;
    }
    .timeline-version {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 0.75rem;
    }
    .timeline-badge {
      display: inline-flex;
      align-items: center;
      padding: 0.125rem 0.5rem;
      border-radius: 9999px;
      font-size: 0.625rem;
      font-weight: 700;
      text-transform: uppercase;
    }
    .timeline-badge.major {
      background: #00f5a0;
      color: #000;
    }
    .timeline-badge.minor {
      background: #00d4ff;
      color: #000;
    }
    .timeline-badge.patch {
      background: var(--text-muted);
      color: var(--bg-primary);
    }
    .timeline-content {
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      padding: 1.25rem;
    }
    .timeline-changes {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .timeline-change {
      display: flex;
      align-items: flex-start;
      gap: 0.75rem;
      padding: 0.5rem 0;
      border-bottom: 1px solid var(--border-color);
    }
    .timeline-change:last-child {
      border-bottom: none;
      padding-bottom: 0;
    }
    .timeline-change:first-child {
      padding-top: 0;
    }
    .change-type {
      display: inline-flex;
      align-items: center;
      padding: 0.125rem 0.5rem;
      border-radius: var(--radius-sm);
      font-size: 0.625rem;
      font-weight: 700;
      text-transform: uppercase;
      flex-shrink: 0;
    }
    .change-type.feat {
      background: #00f5a020;
      color: #00f5a0;
    }
    .change-type.fix {
      background: #ff475720;
      color: #ff4757;
    }
    .change-type.improve {
      background: #00d4ff20;
      color: #00d4ff;
    }
    .change-type.docs {
      background: #ffb80020;
      color: #ffb800;
    }
    .change-desc {
      color: var(--text-secondary);
      font-size: 0.875rem;
      line-height: 1.5;
    }
    .changelog-footer {
      margin-top: 3rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border-color);
      text-align: center;
      font-size: 0.875rem;
      color: var(--text-muted);
    }
    .changelog-empty {
      text-align: center;
      padding: 3rem 2rem;
      color: var(--text-muted);
    }
    @media (max-width: 640px) {
      .changelog-page {
        padding: 1rem;
      }
      .changelog-header {
        flex-wrap: wrap;
      }
      .changelog-title {
        font-size: 1.25rem;
        width: 100%;
        margin-top: 0.5rem;
      }
      .timeline {
        padding-left: 1.5rem;
      }
      .timeline-item {
        padding-left: 1rem;
      }
      .timeline-item::before {
        left: -1.5rem;
        width: 10px;
        height: 10px;
      }
    }
  </style>
</head>
<body>
  <div class="changelog-page">
    <header class="changelog-header">
      <a href="/" class="changelog-back-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="19" y1="12" x2="5" y2="12"/>
          <polyline points="12,19 5,12 12,5"/>
        </svg>
        戻る
      </a>
      <h1 class="changelog-title">更新状況</h1>
    </header>

    <p class="changelog-subtitle">Sutemeadoのバージョン履歴と変更ログです。</p>

    <div class="timeline">

            </li>
            <li class="timeline-change">
              <span class="change-type fix">FIX</span>

        </div>

      <div class="changelog-empty">

    </div>

    <div class="changelog-footer">
      <p>&copy; 2026 Sutemeado - ステメアド</p>
    </div>
  </div>
</body>
</html>
