<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>更新内容 - Sutemeado</title>
  <link rel="stylesheet" href="style.css?v=20260326e">
  <style>
    .changelog-page {
      max-width: 800px;
      margin: 0 auto;
      padding: 20px;
    }
    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 30px;
      flex-wrap: wrap;
      gap: 15px;
    }
    .page-header h1 {
      font-size: 24px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--text-color);
      text-decoration: none;
      opacity: 0.7;
      transition: opacity 0.2s;
    }
    .back-link:hover {
      opacity: 1;
    }
    .version-filter {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .filter-btn {
      padding: 6px 12px;
      border: 1px solid var(--border-color);
      border-radius: 20px;
      background: transparent;
      color: var(--text-color);
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .filter-btn:hover,
    .filter-btn.active {
      background: var(--accent-color);
      border-color: var(--accent-color);
      color: white;
    }
    .changelog-list {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .version-block {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      overflow: hidden;
    }
    .version-header {
      padding: 20px;
      background: linear-gradient(135deg, rgba(139, 92, 246, 0.1) 0%, rgba(59, 130, 246, 0.05) 100%);
      border-bottom: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
    }
    .version-number {
      font-size: 20px;
      font-weight: 700;
      color: var(--accent-color);
    }
    .version-date {
      font-size: 13px;
      opacity: 0.6;
    }
    .version-badge {
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
    }
    .version-badge.major {
      background: #ef4444;
      color: white;
    }
    .version-badge.minor {
      background: #3b82f6;
      color: white;
    }
    .version-badge.patch {
      background: #22c55e;
      color: white;
    }
    .changes-list {
      padding: 20px;
    }
    .change-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .change-item:last-child {
      border-bottom: none;
    }
    .change-type {
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      white-space: nowrap;
    }
    .change-type.feature {
      background: #22c55e;
      color: white;
    }
    .change-type.fix {
      background: #ef4444;
      color: white;
    }
    .change-type.improve {
      background: #3b82f6;
      color: white;
    }
    .change-type.docs {
      background: #f59e0b;
      color: white;
    }
    .change-desc {
      font-size: 14px;
      line-height: 1.5;
    }
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      opacity: 0.6;
    }
    .admin-section {
      background: linear-gradient(135deg, rgba(139, 92, 246, 0.1) 0%, rgba(59, 130, 246, 0.05) 100%);
      border: 2px dashed rgba(139, 92, 246, 0.3);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 30px;
      display: none;
    }
    .admin-section.visible {
      display: block;
    }
    .admin-section h3 {
      margin-bottom: 15px;
      color: #8b5cf6;
    }
    .admin-form {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .admin-form input,
    .admin-form select,
    .admin-form textarea {
      padding: 10px;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      background: var(--input-bg);
      color: var(--text-color);
      font-family: inherit;
    }
    .admin-form textarea {
      min-height: 80px;
      resize: vertical;
    }
    .admin-form button {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      background: linear-gradient(135deg, #8b5cf6 0%, #7c3aed 100%);
      color: white;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }
    .admin-form button:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(139, 92, 246, 0.4);
    }
    .json-output {
      background: rgba(0,0,0,0.3);
      padding: 12px;
      border-radius: 8px;
      font-family: monospace;
      font-size: 12px;
      word-break: break-all;
      margin-top: 10px;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <div class="changelog-page">
    <a href="/" class="back-link">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
      戻る
    </a>

    <div class="page-header">
      <h1>📝 更新内容</h1>
      <div class="version-filter">
        <button class="filter-btn active" onclick="filterVersion('all')">すべて</button>
        <button class="filter-btn" onclick="filterVersion('major')">メジャー</button>
        <button class="filter-btn" onclick="filterVersion('minor')">マイナー</button>
        <button class="filter-btn" onclick="filterVersion('patch')">パッチ</button>
      </div>
    </div>

    <!-- 管理者用フォーム (URLに?admin=1で表示) -->
    <div class="admin-section" id="adminSection">
      <h3>🔧 管理者用 - 更新履歴追加</h3>
      <form class="admin-form" id="adminForm">
        <input type="text" id="version" placeholder="バージョン (例: 1.2.0)" required>
        <select id="versionType">
          <option value="major">メジャー (破壊的変更)</option>
          <option value="minor">マイナー (新機能)</option>
          <option value="patch" selected>パッチ (バグ修正)</option>
        </select>
        <input type="date" id="releaseDate" required>
        <div id="changesContainer">
          <div class="change-input">
            <select class="change-type">
              <option value="feature">✨ 新機能</option>
              <option value="fix">🐛 修正</option>
              <option value="improve">⚡ 改善</option>
              <option value="docs">📚 ドキュメント</option>
            </select>
            <input type="text" class="change-desc" placeholder="変更内容" required>
          </div>
        </div>
        <button type="button" onclick="addChangeInput()">+ 変更を追加</button>
        <button type="submit">バージョンを追加</button>
      </form>
      <div class="json-output" id="jsonOutput"></div>
    </div>

    <div class="changelog-list" id="changelogList">
      <!-- 更新履歴はJSで動的に生成 -->
    </div>

    <div class="empty-state" id="emptyState" style="display: none;">
      <p>📝 更新履歴はありません</p>
    </div>
  </div>

  <script>
    // サンプル更新履歴データ
    let changelogData = [
      {
        version: '1.1.0',
        date: '2026-03-26',
        type: 'minor',
        changes: [
          { type: 'feature', desc: '稼働状況ページを追加' },
          { type: 'feature', desc: 'お知らせ・更新内容ページを追加' },
          { type: 'improve', desc: 'ドロワーメニューの構成を改善' },
          { type: 'fix', desc: 'バックアップ機能の非同期処理を最適化' }
        ]
      },
      {
        version: '1.0.2',
        date: '2026-03-25',
        type: 'patch',
        changes: [
          { type: 'fix', desc: 'formatNumber関数のnull/undefined対応' },
          { type: 'improve', desc: '統計カウンターの表示を改善' }
        ]
      },
      {
        version: '1.0.1',
        date: '2026-03-25',
        type: 'patch',
        changes: [
          { type: 'fix', desc: 'nullish coalescing演算子の誤りを修正' },
          { type: 'fix', desc: 'バックアップ機能がAPIをブロックする問題を解消' }
        ]
      },
      {
        version: '1.0.0',
        date: '2026-03-25',
        type: 'major',
        changes: [
          { type: 'feature', desc: 'Sutemeado 正式リリース' },
          { type: 'feature', desc: '一時メールアドレス作成機能' },
          { type: 'feature', desc: 'ログイン機能（パスワード保護）' },
          { type: 'feature', desc: 'リアルタイム自動バックアップシステム' },
          { type: 'feature', desc: '日本語・英語対応' }
        ]
      }
    ];

    let currentFilter = 'all';

    // URLパラメータチェック
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.has('admin')) {
      document.getElementById('adminSection').classList.add('visible');
      document.getElementById('releaseDate').valueAsDate = new Date();
    }

    function renderChangelog() {
      const list = document.getElementById('changelogList');
      const empty = document.getElementById('emptyState');
      
      const filtered = currentFilter === 'all' 
        ? changelogData 
        : changelogData.filter(v => v.type === currentFilter);
      
      if (filtered.length === 0) {
        list.style.display = 'none';
        empty.style.display = 'block';
        return;
      }
      
      list.style.display = 'flex';
      empty.style.display = 'none';
      
      list.innerHTML = filtered.map(version => {
        const typeLabels = {
          major: { text: 'MAJOR', class: 'major' },
          minor: { text: 'MINOR', class: 'minor' },
          patch: { text: 'PATCH', class: 'patch' }
        };
        const typeLabel = typeLabels[version.type];
        
        const changesHtml = version.changes.map(change => {
          const typeClasses = {
            feature: 'feature',
            fix: 'fix',
            improve: 'improve',
            docs: 'docs'
          };
          const typeTexts = {
            feature: '新機能',
            fix: '修正',
            improve: '改善',
            docs: 'ドキュメント'
          };
          
          return `
            <div class="change-item">
              <span class="change-type ${typeClasses[change.type]}">${typeTexts[change.type]}</span>
              <span class="change-desc">${escapeHtml(change.desc)}</span>
            </div>
          `;
        }).join('');
        
        return `
          <div class="version-block" data-type="${version.type}">
            <div class="version-header">
              <div>
                <div class="version-number">v${escapeHtml(version.version)}</div>
                <div class="version-date">${version.date}</div>
              </div>
              <span class="version-badge ${typeLabel.class}">${typeLabel.text}</span>
            </div>
            <div class="changes-list">
              ${changesHtml}
            </div>
          </div>
        `;
      }).join('');
    }

    function filterVersion(type) {
      currentFilter = type;
      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.classList.toggle('active', btn.textContent.includes(getFilterLabel(type)));
      });
      renderChangelog();
    }

    function getFilterLabel(type) {
      const labels = { all: 'すべて', major: 'メジャー', minor: 'マイナー', patch: 'パッチ' };
      return labels[type];
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function addChangeInput() {
      const container = document.getElementById('changesContainer');
      const div = document.createElement('div');
      div.className = 'change-input';
      div.innerHTML = `
        <select class="change-type">
          <option value="feature">✨ 新機能</option>
          <option value="fix">🐛 修正</option>
          <option value="improve">⚡ 改善</option>
          <option value="docs">📚 ドキュメント</option>
        </select>
        <input type="text" class="change-desc" placeholder="変更内容" required>
        <button type="button" onclick="this.parentElement.remove()">削除</button>
      `;
      container.appendChild(div);
    }

    // 管理者フォーム
    document.getElementById('adminForm')?.addEventListener('submit', (e) => {
      e.preventDefault();
      
      const changes = [];
      document.querySelectorAll('.change-input').forEach(input => {
        const type = input.querySelector('.change-type').value;
        const desc = input.querySelector('.change-desc').value;
        if (desc) changes.push({ type, desc });
      });
      
      const newVersion = {
        version: document.getElementById('version').value,
        type: document.getElementById('versionType').value,
        date: document.getElementById('releaseDate').value,
        changes: changes
      };
      
      document.getElementById('jsonOutput').textContent = JSON.stringify(newVersion, null, 2);
      
      changelogData.unshift(newVersion);
      renderChangelog();
      
      alert('バージョンを追加しました！JSONをコピーして changelog.json に追加してください。');
    });

    // 初期表示
    renderChangelog();

    // 外部JSON読み込み
    fetch('data/changelog.json')
      .then(r => r.json())
      .then(data => {
        changelogData = data;
        renderChangelog();
      })
      .catch(() => {});
  </script>
</body>
</html>
