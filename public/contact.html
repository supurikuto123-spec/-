<!DOCTYPE html>
<html lang="ja" data-theme="neon">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>お問い合わせ - Sutemeado</title>
  <meta name="description" content="Sutemeado一時メールサービスへのお問い合わせはこちらから。">
  <meta name="theme-color" content="#0a0a0f">
  <link rel="icon" href="/favicon.ico?v=20260324c" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png?v=20260324c">
  <link rel="stylesheet" href="/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    .contact-page {
      max-width: 700px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
      min-height: 100vh;
    }
    .contact-header {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 2rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--border-color);
    }
    .contact-back-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 1rem;
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      color: var(--text-primary);
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      text-decoration: none;
    }
    .contact-back-btn:hover {
      background: var(--accent-primary);
      color: #000;
      border-color: var(--accent-primary);
    }
    .contact-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text-primary);
      margin: 0;
    }
    .contact-intro {
      color: var(--text-secondary);
      margin-bottom: 2rem;
      line-height: 1.7;
    }
    .contact-section {
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }
    .contact-section-title {
      font-size: 1.125rem;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .contact-methods {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .contact-method {
      display: flex;
      align-items: flex-start;
      gap: 1rem;
      padding: 1rem;
      background: var(--bg-primary);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      transition: all 0.2s ease;
    }
    .contact-method:hover {
      border-color: var(--accent-primary);
    }
    .contact-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
      border-radius: var(--radius-md);
      flex-shrink: 0;
    }
    .contact-icon svg {
      color: #fff;
    }
    .contact-icon.instagram {
      background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
    }
    .contact-info {
      flex: 1;
    }
    .contact-label {
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 0.25rem;
    }
    .contact-value {
      color: var(--text-secondary);
      font-size: 0.875rem;
      margin-bottom: 0.5rem;
    }
    .contact-link {
      display: inline-flex;
      align-items: center;
      gap: 0.25rem;
      color: var(--accent-primary);
      text-decoration: none;
      font-size: 0.875rem;
      font-weight: 500;
    }
    .contact-link:hover {
      text-decoration: underline;
    }
    .contact-footer {
      margin-top: 3rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border-color);
      text-align: center;
      font-size: 0.875rem;
      color: var(--text-muted);
    }
    .disclaimer {
      background: #ffb80010;
      border: 1px solid #ffb80030;
      border-radius: var(--radius-md);
      padding: 1rem;
      margin-top: 1.5rem;
    }
    .disclaimer-title {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-weight: 600;
      color: #ffb800;
      margin-bottom: 0.5rem;
      font-size: 0.875rem;
    }
    .disclaimer-text {
      font-size: 0.8125rem;
      color: var(--text-secondary);
      line-height: 1.5;
    }
    @media (max-width: 640px) {
      .contact-page {
        padding: 1rem;
      }
      .contact-header {
        flex-wrap: wrap;
      }
      .contact-title {
        font-size: 1.25rem;
        width: 100%;
        margin-top: 0.5rem;
      }
      .contact-method {
        flex-direction: column;
        text-align: center;
      }
      .contact-icon {
        margin: 0 auto;
      }
    }
  </style>
</head>
<body>
  <div class="contact-page">
    <header class="contact-header">
      <a href="/" class="contact-back-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="19" y1="12" x2="5" y2="12"/>
          <polyline points="12,19 5,12 12,5"/>
        </svg>
        戻る
      </a>
      <h1 class="contact-title">お問い合わせ</h1>
    </header>

    <p class="contact-intro">
      Sutemeadoに関するご質問・ご意見・不具合報告などがございましたら、以下の方法でご連絡ください。
    </p>

    <div class="contact-section">
      <h2 class="contact-section-title">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>
        </svg>
        お問い合わせ方法
      </h2>
      <div class="contact-methods">
        <div class="contact-method">
          <div class="contact-icon instagram">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
              <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/>
              <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/>
            </svg>
          </div>
          <div class="contact-info">
            <div class="contact-label">Instagram DM</div>
            <div class="contact-value">@not_rare.tar へのダイレクトメッセージでお問い合わせください</div>
            <a href="https://instagram.com/not_rare.tar" target="_blank" rel="noopener noreferrer" class="contact-link">
              @not_rare.tar を開く
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
                <polyline points="15 3 21 3 21 9"/>
                <line x1="10" y1="14" x2="21" y2="3"/>
              </svg>
            </a>
          </div>
        </div>
      </div>
    </div>

    <div class="disclaimer">
      <div class="disclaimer-title">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
          <line x1="12" y1="9" x2="12" y2="13"/>
          <line x1="12" y1="17" x2="12.01" y2="17"/>
        </svg>
        注意事項
      </div>
      <p class="disclaimer-text">
        ・お問い合わせ対応はベストエフォートで行っており、返答を保証するものではありません<br>
        ・迷惑行為や業務妨害となるお問い合わせはお控えください
      </p>
    </div>

    <div class="contact-footer">
      <p>&copy; 2026 Sutemeado - ステメアド</p>
    </div>
  </div>
</body>
</html>
