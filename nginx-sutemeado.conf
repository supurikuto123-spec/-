# Sutemeado nginx設定（504エラー対策版）
# この設定を /etc/nginx/sites-available/sutemeado にコピーして適用してください

upstream sutemeado_backend {
    server 127.0.0.1:3001;
    # バックエンドが応答しない場合のフォールバック
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name sutemeado.com www.sutemeado.com;
    
    # 80→443リダイレクト（HTTPS対応時）
    # return 301 https://$server_name$request_uri;
    
    # タイムアウト設定（504対策： upstreamとの接続タイムアウトを延長）
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;
    
    # バッファ設定（パフォーマンス向上）
    proxy_buffering on;
    proxy_buffer_size 4k;
    proxy_buffers 8 4k;
    proxy_busy_buffers_size 8k;
    
    # ヘルスチェック（オプション）
    location /health {
        proxy_pass http://sutemeado_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        access_log off;
    }
    
    # APIリクエスト
    location /api/ {
        proxy_pass http://sutemeado_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        
        # 504対策：タイムアウト延長
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }
    
    # 静的ファイル
    location / {
        proxy_pass http://sutemeado_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # 504対策
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }
    
    # エラーページ
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root /var/www/html;
        internal;
    }
}

