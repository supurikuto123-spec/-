<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>稼働状況 | tomy634.com</title>
<link rel="icon" type="image/png" href="/favicon.png">
<style>
:root{--bg:#0a0f12;--text:#d7ffe8;--accent:#74ffcf;--muted:#89bfa6;--line:rgba(116,255,207,.25);--ok:#7dffb3;--warn:#ffd569;--err:#ff7189;}
*{box-sizing:border-box} body{margin:0;font-family:ui-monospace,Consolas,monospace;background:var(--bg);color:var(--text)}
header{position:sticky;top:0;z-index:10;background:rgba(10,15,18,.95);border-bottom:1px solid var(--line);padding:10px 12px}
.hbar{display:flex;align-items:center;gap:10px}
.logo{width:34px;height:34px;border:1px solid var(--accent);border-radius:8px;display:grid;place-items:center}
.logo::after{content:"$";color:var(--accent);font-weight:700}
h1{font-size:16px;margin:0;color:var(--accent)}
.wrap{max-width:900px;margin:auto;padding:16px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:12px}
.card{border:1px solid var(--line);border-radius:10px;background:rgba(12,24,28,.8);padding:14px 16px}
.kv{display:flex;align-items:center;justify-content:space-between;gap:8px}
.badge{display:inline-flex;align-items:center;gap:6px;border-radius:999px;padding:4px 10px;border:1px solid var(--line);font-size:12px}
.badge.ok{color:var(--bg);background:var(--ok);border-color:transparent}
.badge.warn{color:var(--bg);background:var(--warn);border-color:transparent}
.badge.err{color:#fff;background:var(--err);border-color:transparent}
.small{color:var(--muted);font-size:12px}
.btn{font-family:inherit;font-size:12px;padding:6px 10px;border-radius:999px;border:1px solid var(--accent);background:transparent;color:var(--accent);cursor:pointer}
.btn:hover{background:rgba(116,255,207,.12)}
a.back{color:var(--muted);text-decoration:none;border:1px solid var(--line);border-radius:999px;padding:6px 10px}
a.back:hover{color:var(--accent);border-color:var(--accent)}
</style>
</head>
<body>
<header><div class="hbar"><div class="logo"></div><h1>tomy634.com // 稼働状況</h1></div></header>
<div class="wrap">
  <p><a class="back" href="/">← 受信ボックスへ戻る</a></p>

  <div class="grid">
    <div class="card">
      <div class="kv"><div>フロント（/）</div><div id="front-badge" class="badge">checking...</div></div>
      <div class="small" id="front-note"></div>
    </div>
    <div class="card">
      <div class="kv"><div>静的API配信（/api/boxes/*.json）</div><div id="static-badge" class="badge">checking...</div></div>
      <div class="small" id="static-note"></div>
    </div>
    <div class="card">
      <div class="kv"><div>API ping（/api/v1/ping）</div><div id="ping-badge" class="badge">checking...</div></div>
      <div class="small" id="ping-note"></div>
    </div>
    <div class="card">
      <div class="kv"><div>総件数（/api/v1/stats）</div><div id="stats-badge" class="badge">checking...</div></div>
      <div class="small" id="stats-note"></div>
    </div>
  </div>

  <div class="card" style="margin-top:12px">
    <button id="refresh" class="btn" type="button">今すぐ再チェック</button>
  </div>
</div>

<script>
const PUBLIC_API_KEY = "pub_czt56mzcxy8zixlhb3a8n9ij";
const REFRESH_MS = 30000;

function setBadge(id, state, text){ const el=document.getElementById(id); if(!el) return; el.className='badge '+(state==='ok'?'ok':state==='warn'?'warn':'err'); el.textContent=text; }
function setNote(id, text){ const el=document.getElementById(id); if(el) el.textContent=text; }
function ms(){ return performance && performance.now ? performance.now() : Date.now(); }

async function checkFront(){
  const t=ms();
  try{ const r=await fetch('/',{cache:'no-store'}); const d=Math.max(1,Math.round(ms()-t));
    if(r.ok){ setBadge('front-badge','ok','OK '+d+'ms'); setNote('front-note','応答OK'); }
    else{ setBadge('front-badge','err','HTTP '+r.status); setNote('front-note','エラー応答'); }
  }catch(e){ setBadge('front-badge','err','ERROR'); setNote('front-note','到達不可'); }
}

async function checkStatic(){
  const url='/api/boxes/healthcheck.json?t='+Date.now(); const t=ms();
  try{ const r=await fetch(url,{cache:'no-store'}); const d=Math.max(1,Math.round(ms()-t));
    if(r.ok||r.status===404){ setBadge('static-badge','ok','OK '+d+'ms'); setNote('static-note','到達OK（HTTP '+r.status+'）'); }
    else{ setBadge('static-badge','warn','HTTP '+r.status); setNote('static-note','想定外応答'); }
  }catch(e){ setBadge('static-badge','err','ERROR'); setNote('static-note','到達不可'); }
}

async function checkPing(){
  const t=ms();
  try{ const r=await fetch('/api/v1/ping?api_key='+encodeURIComponent(PUBLIC_API_KEY),{cache:'no-store'}); const d=Math.max(1,Math.round(ms()-t));
    if(!r.ok){ setBadge('ping-badge','warn','HTTP '+r.status); setNote('ping-note','認証警告'); return; }
    const j=await r.json().catch(()=>null); const name=j&&j.api_key_name?j.api_key_name:'unknown';
    setBadge('ping-badge','ok','OK '+d+'ms'); setNote('ping-note','api_key_name: '+name+(j&&j.server_time?' / '+j.server_time:'')); 
  }catch(e){ setBadge('ping-badge','err','ERROR'); setNote('ping-note','到達不可'); }
}

async function checkStats(){
  try{ const r=await fetch('/api/v1/stats',{cache:'no-store'});
    if(!r.ok){ setBadge('stats-badge','warn','HTTP '+r.status); setNote('stats-note','未提供または非公開'); return; }
    const j=await r.json().catch(()=>null);
    const boxes=j&&j.total_boxes!=null?j.total_boxes:null, msgs=j&&j.total_messages!=null?j.total_messages:null;
    setBadge('stats-badge','ok','OK'); setNote('stats-note',(boxes!=null?'boxes: '+boxes.toLocaleString('ja-JP')+' / ':'')+(msgs!=null?'messages: '+msgs.toLocaleString('ja-JP'):'')); 
  }catch(e){ setBadge('stats-badge','warn','N/A'); setNote('stats-note','未対応'); }
}

async function runAll(){ await Promise.all([checkFront(),checkStatic(),checkPing(),checkStats()]); }
document.getElementById('refresh').addEventListener('click', runAll);
document.addEventListener('DOMContentLoaded', function(){ runAll(); setInterval(runAll, REFRESH_MS); });
</script>
</body>
</html>
